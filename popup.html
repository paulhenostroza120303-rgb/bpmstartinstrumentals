<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPMSTART Instrumentals</title>
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #272727;
      --text-primary: #f1f1f1;
      --text-secondary: #aaa;
      --accent: #ff4444;
      --accent-hover: #ff6666;
      --success: #2ecc71;
      --border: #333;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 340px;
      min-height: 300px;
      font-size: 13px;
      line-height: 1.5;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header .version {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .section {
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .api-input-group {
      display: flex;
      gap: 6px;
    }

    .api-input-group input {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-input-group input:focus {
      border-color: var(--accent);
    }

    .api-input-group input::placeholder {
      color: #555;
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #333;
    }

    .btn-success {
      background: var(--success);
    }

    .btn-success:hover {
      background: #27ae60;
    }

    .status-bar {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      flex-shrink: 0;
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
      animation: pulse 2s infinite;
    }

    .status-dot.error {
      background: var(--accent);
    }

    .status-dot.processing {
      background: #f39c12;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-text strong {
      color: var(--text-primary);
    }

    .shortcuts {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .shortcut-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .shortcut-item .key {
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: var(--text-secondary);
    }

    .shortcut-item .desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 11px;
    }

    .footer a:hover {
      color: var(--accent);
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--success);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status-detail {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .status-detail.error-text {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <h1>BPMSTART</h1>
      <span class="version">v1.0.0</span>
    </div>

    <!-- Estado actual -->
    <div class="section">
      <div class="section-title">Estado</div>
      <div class="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <div>
          <span class="status-text" id="status-text">
            <strong>Inactivo</strong> — Abre YouTube para empezar
          </span>
          <div class="status-detail" id="status-detail"></div>
        </div>
      </div>
    </div>

    <!-- API Key -->
    <div class="section">
      <div class="section-title">API Key de mvsep.com</div>
      <div class="api-input-group">
        <input type="password" id="api-key-input" placeholder="Ingresa tu API key..." spellcheck="false">
        <button class="btn" id="btn-save-key">Guardar</button>
      </div>
    </div>

    <!-- Atajos -->
    <div class="section">
      <div class="section-title">Atajos de Teclado</div>
      <div class="shortcuts">
        <div class="shortcut-item">
          <span class="desc">Abrir / Cerrar panel</span>
          <span class="key">Ctrl+Shift+S</span>
        </div>
        <div class="shortcut-item">
          <span class="desc">Separar audio</span>
          <span class="key">Desde el panel</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://mvsep.com" target="_blank">mvsep.com</a>
      <a href="#" id="btn-reset">Restablecer</a>
    </div>
  </div>

  <div class="toast" id="toast">✓ API key guardada</div>

  <script src="popup.js"></script>
</body>
</html>
